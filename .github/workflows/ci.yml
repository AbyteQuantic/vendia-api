# CI for the Go backend (vendia-api).
#
# Triggers on every push to main + every PR. Render still
# auto-deploys on push-to-main; this workflow is a visible safety
# net so a regression in vet / build / race-tests shows up on the
# PR before reviewers click merge.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: vet + build + test -race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Matches the `go 1.25.0` directive in `go.mod`. Bump
          # deliberately when the repo's go.mod is bumped — letting
          # this float as `1.x` would mask "works on my machine"
          # incompatibilities.
          go-version: '1.25.0'
          cache: true

      - name: Resolve modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        # Compiles every package, including `cmd/server`. Catches
        # type errors / import cycles before they ship to Render.
        run: go build ./...

      - name: Test with race detector
        # `-race` requires CGO; ubuntu-latest runners ship gcc. The
        # 5 SKIP tests that gate on Docker Postgres skip gracefully
        # via TCP pre-check (see `tenant_register_test.go`).
        run: go test -race -count=1 ./...
