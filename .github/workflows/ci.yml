# CI for the Go backend (vendia-api).
#
# Triggers on every push to main + every PR. Render still
# auto-deploys on push-to-main; this workflow is a visible safety
# net so a regression in vet / build / race-tests shows up on the
# PR before reviewers click merge.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opta por Node.js 24 en las acciones JS de GitHub (checkout/cache/setup-*
# lo soportan); silencia el aviso de deprecación de Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  go:
    name: vet + build + test -race
    runs-on: ubuntu-latest
    # Postgres para la suite de integración. Los tests dialan localhost:5499
    # (mismo puerto que `docker-compose.yml` publica en local), así que el
    # servicio mapea 5432→5499 y la TCP pre-check los deja correr en CI en
    # lugar de saltarlos. Sin esto, ~45 tests de integración (register,
    # business profile, secuencias de cotización) nunca se ejecutaban en CI.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vendia
          POSTGRES_PASSWORD: vendia_secret
          POSTGRES_DB: vendia
        ports:
          - 5499:5432
        options: >-
          --health-cmd "pg_isready -U vendia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Matches the `go 1.25.0` directive in `go.mod`. Bump
          # deliberately when the repo's go.mod is bumped — letting
          # this float as `1.x` would mask "works on my machine"
          # incompatibilities.
          go-version: '1.25.0'
          cache: true

      - name: Resolve modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        # Compiles every package, including `cmd/server`. Catches
        # type errors / import cycles before they ship to Render.
        run: go build ./...

      - name: Test with race detector
        # `-race` requires CGO; ubuntu-latest runners ship gcc. La suite de
        # integración (gated en localhost:5499) ahora SÍ corre gracias al
        # servicio `postgres` de arriba; sin él, la TCP pre-check de
        # `tenant_register_test.go` la saltaría.
        run: go test -race -count=1 ./...
