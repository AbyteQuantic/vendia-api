# Scheduler de los jobs internos del backend (Render no tiene Cron Jobs en
# el plan actual; GitHub Actions hace de reloj y golpea los endpoints
# `/api/v1/internal/jobs/*`, protegidos por Bearer CRON_TOKEN — ver
# internal/handlers/internal_jobs.go: fail-closed 503 si el env var no está
# en Render, 401 si el token no coincide).
#
# Secrets requeridos (Settings → Secrets and variables → Actions):
#   CRON_TOKEN   el mismo valor configurado como env var CRON_TOKEN en Render
#
# Cadencias (cron de GitHub corre en UTC; Colombia = UTC-5):
#   */30 * * * *  promotions-push   recordatorios de promos programadas (F033)
#   10 5  * * *   expire-quotes     vence cotizaciones enviadas (F031) — 00:10 COT
#   0  13 * * *   event-reminders   recordatorios de eventos (F042) — 08:00 COT
#   0  9  * * 1   scrape-chains     precios de cadenas (Spec 077) — lunes 04:00 COT
#
# workflow_dispatch corre los TRES (útil para probar de una).
name: cron-jobs

on:
  schedule:
    - cron: '*/30 * * * *'
    - cron: '10 5 * * *'
    - cron: '0 13 * * *'
    - cron: '0 9 * * 1' # scrape-chains semanal (lunes 04:00 COT) — Spec 077
  workflow_dispatch:

permissions: {}

concurrency:
  group: cron-jobs
  cancel-in-progress: false

env:
  API: https://api.vendia.store

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: promotions-push (F033)
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/30 * * * *'
        run: |
          code=$(curl -sS -o /tmp/out.json -w '%{http_code}' --retry 3 --retry-delay 10 \
            -X POST "$API/api/v1/internal/jobs/promotions-push" \
            -H "Authorization: Bearer ${{ secrets.CRON_TOKEN }}")
          cat /tmp/out.json; echo
          [ "$code" = "200" ] || { echo "::error::promotions-push HTTP $code"; exit 1; }

      - name: expire-quotes (F031)
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '10 5 * * *'
        run: |
          code=$(curl -sS -o /tmp/out.json -w '%{http_code}' --retry 3 --retry-delay 10 \
            -X POST "$API/api/v1/internal/jobs/expire-quotes" \
            -H "Authorization: Bearer ${{ secrets.CRON_TOKEN }}")
          cat /tmp/out.json; echo
          [ "$code" = "200" ] || { echo "::error::expire-quotes HTTP $code"; exit 1; }

      - name: event-reminders (F042)
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 13 * * *'
        run: |
          code=$(curl -sS -o /tmp/out.json -w '%{http_code}' --retry 3 --retry-delay 10 \
            -X POST "$API/api/v1/internal/jobs/event-reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_TOKEN }}")
          cat /tmp/out.json; echo
          [ "$code" = "200" ] || { echo "::error::event-reminders HTTP $code"; exit 1; }

      - name: scrape-chains (Spec 077 — semanal)
        # always(): no lo bloquea un fallo de un job anterior en pruebas manuales.
        if: always() && (github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * 1')
        run: |
          code=$(curl -sS -o /tmp/out.json -w '%{http_code}' --max-time 300 --retry 2 --retry-delay 15 \
            -X POST "$API/api/v1/internal/jobs/scrape-chains" \
            -H "Authorization: Bearer ${{ secrets.CRON_TOKEN }}")
          cat /tmp/out.json; echo
          [ "$code" = "200" ] || { echo "::error::scrape-chains HTTP $code"; exit 1; }
